<html>
<head>
    <title>Testing Class Rules</title>
    <style type="text/css">
        .redtext {color:#AA0000;}
        h1.greentext {color:#99ff99;}
        p.greentext {color: #006600;}
    </style>
</head>
<body>
    <h1>A normal heading</h1>
    <p> A normal paragraph</p>
    <h1 class="redtext">A red heading</h1>
    <p class="redtext">A red text paragraph</p>
    <h1 class="greentext">A green heading</h1>
    <p class="greentext">A different coloured green paragraph</p>
</body>
</html>
